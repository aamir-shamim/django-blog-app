<!DOCTYPE html>
<html>
<head>
    <title>Edit Post</title>
</head>
<body>

<h1>Edit Post ✏️</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="title" value="{{ post.title }}"><br><br>

    <textarea name="content">{{ post.content }}</textarea><br><br>

    <button type="submit">Update</button>
</form>

</body>
</html>
