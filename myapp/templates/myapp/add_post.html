<!DOCTYPE html>
<html>
<head>
    <title>Add Post</title>
</head>
<body>

    <h1>Add New Post 🚀</h1>

    <form method="POST">
        {% csrf_token %}
        
        <input type="text" name="title" placeholder="Enter title"><br><br>
        
        <textarea name="content" placeholder="Enter content"></textarea><br><br>
        
        <button type="submit">Submit</button>
    </form>

</body>
</html>
