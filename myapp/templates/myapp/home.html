{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Posts</title>
</head>
<body>

    <h1>All Posts 🚀</h1>

    <a href="/add/">➕ Add New Post</a>

    <hr>

    {% for post in posts %}
        <h2>{{ post.title }}</h2>
        <p>{{ post.content }}</p>

        <a href="/edit/{{ post.id }}">Edit</a> |
        <a href="/delete/{{ post.id }}">Delete</a>

        <hr>
    {% endfor %}

</body>
</html>
